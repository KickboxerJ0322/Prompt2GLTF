<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLTF Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --accent: #6ee7f7;
    --accent2: #a78bfa;
    --text: #e0e0f0;
    --muted: #5a5a7a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent2); }

  .hint {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  #canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
    transition: opacity 0.4s ease;
  }

  #drop-zone.hidden { opacity: 0; pointer-events: none; }

  .drop-box {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 48px 64px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: rgba(18,18,26,0.85);
    backdrop-filter: blur(8px);
  }

  .drop-box:hover, .drop-box.drag-over {
    border-color: var(--accent);
    background: rgba(110,231,247,0.04);
  }

  .drop-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
    filter: grayscale(0.3);
  }

  .drop-title {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  #file-input { display: none; }

  .controls-bar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .controls-bar.visible { opacity: 1; }

  .ctrl-btn {
    background: rgba(18,18,26,0.9);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, color 0.2s;
  }

  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

  #info {
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    z-index: 5;
    line-height: 1.8;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #info.visible { opacity: 1; }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">GLTF <span>//</span> Viewer</div>
  <div class="hint">drag · scroll · pinch to navigate</div>
</header>

<div id="canvas-container">
  <div class="grid-bg"></div>

  <div id="drop-zone">
    <div class="drop-box" id="drop-box">
      <span class="drop-icon">📦</span>
      <div class="drop-title">Drop GLTF / GLB file</div>
      <div class="drop-sub">クリックしてファイルを選択、<br>またはここにドラッグ＆ドロップ</div>
    </div>
    <input type="file" id="file-input" accept=".gltf,.glb">
  </div>

  <div id="info"></div>

  <div class="controls-bar" id="controls-bar">
    <button class="ctrl-btn" id="btn-reset">⟳ リセット</button>
    <button class="ctrl-btn" id="btn-wire">◻ ワイヤー</button>
    <button class="ctrl-btn" id="btn-new">＋ 別ファイル</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ---- Three.js Setup ----
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 1000);
camera.position.set(0, 1, 3);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0x6ee7f7, 1.2);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xa78bfa, 0.5);
fillLight.position.set(-5, -2, -5);
scene.add(fillLight);

// Grid
const grid = new THREE.GridHelper(10, 20, 0x2a2a3a, 0x1a1a2a);
scene.add(grid);

// Orbit Controls (manual implementation)
let isDragging = false, prevMouse = {x:0, y:0};
let spherical = { theta: 0.3, phi: 1.1, radius: 3 };
let target = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  camera.position.x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = target.y + spherical.radius * Math.cos(spherical.phi);
  camera.position.z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(target);
}
updateCamera();

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = {x: e.clientX, y: e.clientY}; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.008;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.008));
  prevMouse = {x: e.clientX, y: e.clientY};
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  spherical.radius = Math.max(0.5, Math.min(50, spherical.radius + e.deltaY * 0.01));
  updateCamera();
});

// Touch support
let lastTouchDist = null;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY}; }
  if (e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
});
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMouse.x, dy = e.touches[0].clientY - prevMouse.y;
    spherical.theta -= dx * 0.008;
    spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.008));
    prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    updateCamera();
  }
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist) { spherical.radius = Math.max(0.5, Math.min(50, spherical.radius - (dist - lastTouchDist) * 0.01)); updateCamera(); }
    lastTouchDist = dist;
  }
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null; });

// Resize
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// Animation loop
let modelGroup = null;
function animate() {
  requestAnimationFrame(animate);
  if (modelGroup && autoRotate) modelGroup.rotation.y += 0.003;
  renderer.render(scene, camera);
}
animate();

let autoRotate = true;
renderer.domElement.addEventListener('mousedown', () => autoRotate = false);

// ---- GLTF Loader ----
// Minimal GLTF/GLB loader using Three.js r128 compatible approach
function loadGLTFFromArrayBuffer(buffer, fileName) {
  // We'll use the GLTFLoader from CDN via dynamic script loading
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const loader = new THREE.GLTFLoader();
    loader.parse(buffer, '', gltf => onGLTFLoaded(gltf, fileName), err => alert('読み込みエラー: ' + err.message));
  };
  script.onerror = () => alert('GLTFLoaderの読み込みに失敗しました');
  document.head.appendChild(script);
}

function onGLTFLoaded(gltf, fileName) {
  // Remove old model
  if (modelGroup) { scene.remove(modelGroup); modelGroup = null; }

  const model = gltf.scene;

  // Compute bounding box to center and scale
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 2.0 / maxDim;

  model.scale.setScalar(scale);
  model.position.sub(center.multiplyScalar(scale));
  model.position.y += size.y * scale * 0.5 - box.min.y * scale;

  // Shadow
  model.traverse(n => {
    if (n.isMesh) {
      n.castShadow = true;
      n.receiveShadow = true;
    }
  });

  modelGroup = model;
  scene.add(modelGroup);

  // Update UI
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('controls-bar').classList.add('visible');

  const info = document.getElementById('info');
  info.classList.add('visible');
  let meshCount = 0;
  model.traverse(n => { if (n.isMesh) meshCount++; });
  info.innerHTML = `FILE: ${fileName}<br>MESHES: ${meshCount}<br>SIZE: ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`;

  // Adjust camera
  spherical.radius = maxDim * scale * 3;
  target.set(0, size.y * scale * 0.3, 0);
  updateCamera();
  autoRotate = true;
}

// ---- File Handling ----
function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['gltf', 'glb'].includes(ext)) { alert('.gltf または .glb ファイルを選択してください'); return; }
  const reader = new FileReader();
  reader.onload = e => loadGLTFFromArrayBuffer(e.target.result, file.name);
  reader.readAsArrayBuffer(file);
}

document.getElementById('drop-box').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

const dropBox = document.getElementById('drop-box');
dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('drag-over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('drag-over'));
dropBox.addEventListener('drop', e => { e.preventDefault(); dropBox.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });

// Window-level drop
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });

// Controls
let wireframe = false;
document.getElementById('btn-reset').addEventListener('click', () => {
  spherical = { theta: 0.3, phi: 1.1, radius: 3 };
  target.set(0, 0, 0);
  updateCamera();
  autoRotate = true;
});
document.getElementById('btn-wire').addEventListener('click', () => {
  wireframe = !wireframe;
  if (modelGroup) modelGroup.traverse(n => { if (n.isMesh) n.material.wireframe = wireframe; });
  document.getElementById('btn-wire').textContent = wireframe ? '■ ソリッド' : '◻ ワイヤー';
});
document.getElementById('btn-new').addEventListener('click', () => {
  document.getElementById('file-input').value = '';
  document.getElementById('drop-zone').classList.remove('hidden');
  document.getElementById('controls-bar').classList.remove('visible');
  document.getElementById('info').classList.remove('visible');
  if (modelGroup) { scene.remove(modelGroup); modelGroup = null; }
  autoRotate = true;
});
</script>
</body>
</html>
